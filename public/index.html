<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContentBot</title>
  <link rel="manifest" href="/manifest.json" />
</head>
<body style="background:#080a0f;color:white;font-family:sans-serif;padding:20px">

  <div id="login">
    <h1>ContentBot</h1>
    <input type="password" id="pass" placeholder="Password" style="padding:10px;width:260px;" />
    <button onclick="login()" style="padding:10px 14px;">Enter</button>
  </div>

  <div id="app" style="display:none">
    <h1>ContentBot</h1>
    <textarea id="prompt" style="width:100%;height:120px;" placeholder="Escribe tu prompt aquí..."></textarea>
    <br /><br />
    <button onclick="generate()" style="padding:10px 14px;">Generate</button>
    <pre id="output" style="white-space:pre-wrap;margin-top:20px;"></pre>
  </div>

  <script>
    async function login(){
      const r = await fetch("/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({password:document.getElementById("pass").value})
      });

      if(r.ok){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
      } else {
        alert("Wrong password");
      }
    }

    async function generate(){
      const prompt = document.getElementById("prompt").value;

      const r = await fetch("/generate", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({prompt})
      });

      const data = await r.json();

      if (data.respuesta) {
        document.getElementById("output").textContent = data.respuesta;
      } else {
        document.getElementById("output").textContent = JSON.stringify(data, null, 2);
      }
    }
  </script>
</body>
</html>
