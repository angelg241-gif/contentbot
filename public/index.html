<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContentBot</title>
  <link rel="manifest" href="/manifest.json">
</head>
<body style="background:#080a0f;color:white;font-family:sans-serif;padding:20px">

<div id="login">
  <h2>Login</h2>
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none">
  <h2>ContentBot</h2>
  <textarea id="prompt" style="width:100%;height:120px"></textarea>
  <button onclick="generate()">Generate</button>
  <pre id="output"></pre>
</div>

<script>
async function login(){
  const r = await fetch("/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password:document.getElementById("pass").value})
  });
  if(r.ok){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  } else alert("Wrong password");
}

async function generate(){
  const prompt = document.getElementById("prompt").value;
  const r = await fetch("/generate", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt})
  });
  const data = await r.json();
  document.getElementById("output").textContent = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
